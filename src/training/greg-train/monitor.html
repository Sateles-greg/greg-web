<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Treinamento - Greg Train</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f7fafc; margin: 0; padding: 2rem; }
    h1 { color: #2b6cb0; }
    #logs { background: #222; color: #0f0; padding: 1rem; border-radius: 8px; min-height: 200px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>📈 Monitoramento de Treinamento (WebSocket)</h1>
  <div id="logs">Aguardando logs...</div>
  <script>
    const ws = new WebSocket('ws://' + window.location.hostname + ':8765');
    ws.onmessage = e => {
      document.getElementById('logs').textContent += '\n' + e.data;
    };
    ws.onopen = () => {
      document.getElementById('logs').textContent = 'Conectado ao WebSocket.\n';
    };
    ws.onerror = () => {
      document.getElementById('logs').textContent += '\n[ERRO] Falha na conexão WebSocket.';
    };
  </script>
</body>
</html>

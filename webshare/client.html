<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greg - Compartilhamento de Tela (WebRTC)</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #4a4a4a; }
        #video-container { display: flex; gap: 20px; margin-top: 20px; }
        video { border: 2px solid #ccc; background-color: #000; width: 480px; height: 360px; }
        #controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background-color: #007bff; color: white; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; font-style: italic; color: #666; }
    </style>
</head>
<body>
    <h1>Compartilhamento de Tela Simbiótico - Greg</h1>

    <div id="video-container">
        <div>
            <h2>Sua Visão</h2>
            <video id="localVideo" autoplay muted></video>
        </div>
        <div>
            <h2>Visão Remota</h2>
            <video id="remoteVideo" autoplay></video>
        </div>
    </div>

    <div id="controls">
        <button id="startButton">Iniciar Compartilhamento</button>
        <button id="stopButton" disabled>Parar Compartilhamento</button>
    </div>

    <p id="status">Status: Desconectado</p>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const statusDiv = document.getElementById('status');

        const socket = io();
        let localStream;
        let peerConnection;

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' } // Servidor STUN público do Google
            ]
        };

        // --- Lógica de Sinalização (Socket.IO) ---

        socket.on('connect', () => {
            statusDiv.textContent = 'Status: Conectado ao servidor de sinalização.';
        });

        socket.on('offer', async (offer) => {
            if (!peerConnection) {
                await createPeerConnection();
            }
            console.log('Oferta recebida:', offer);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
            statusDiv.textContent = 'Status: Oferta recebida, enviando resposta...';
        });

        socket.on('answer', async (answer) => {
            console.log('Resposta recebida:', answer);
            if (peerConnection && !peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                statusDiv.textContent = 'Status: Conexão estabelecida!';
            }
        });

        socket.on('candidate', async (candidate) => {
            console.log('Candidato ICE recebido:', candidate);
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                } catch (e) {
                    console.error('Erro ao adicionar candidato ICE recebido', e);
                }
            }
        });

        // --- Lógica do WebRTC ---

        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('candidate', event.candidate);
                }
            };

            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };

            // Adiciona as trilhas do stream local à conexão
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
        }

        async function startSharing() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;

                startButton.disabled = true;
                stopButton.disabled = false;
                statusDiv.textContent = 'Status: Capturando tela. Aguardando conexão...';

                await createPeerConnection();

                // O par que inicia a chamada cria a oferta
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('offer', offer);
                statusDiv.textContent = 'Status: Enviando oferta de conexão...';

            } catch (error) {
                console.error('Erro ao iniciar compartilhamento:', error);
                statusDiv.textContent = `Erro: ${error.message}`;
                stopSharing();
            }
        }

        function stopSharing() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            startButton.disabled = false;
            stopButton.disabled = true;
            statusDiv.textContent = 'Status: Desconectado';
        }

        startButton.addEventListener('click', startSharing);
        stopButton.addEventListener('click', stopSharing);

    </script>
</body>
</html>
